model:
  name: meta-llama/Meta-Llama-3-8B
  load_in_4bit: true
  trust_remote_code: true

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM

training:
  output_dir: ./outputs/llama3-lora
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  max_seq_length: 2048
  warmup_steps: 100
  logging_steps: 10
  save_strategy: epoch
  fp16: true

optimization:
  optim: adamw_torch
  lr_scheduler_type: cosine
  weight_decay: 0.01
  gradient_checkpointing: true
  
dataset:
  train_file: data/train.json
  val_file: data/val.json
  text_field: text
  max_samples: null

evaluation:
  tasks:
    - mmlu
    - hellaswag
    - truthfulqa
  batch_size: 8

